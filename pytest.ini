[pytest]
# Pytest Configuration for airdrop_v4
# ================================

# Test discovery
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Paths
testpaths = tests

# Output
addopts = 
    -v
    --tb=short
    --strict-markers
    -ra
    --ignore=tests/run_validation_campaign.py
    --ignore=tests/verify_tls_distribution.py

# Async mode
asyncio_mode = auto

# Markers
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may use real APIs)
    slow: Slow tests (skip with -m 'not slow')
    requires_api: Tests that require real API keys
    requires_db: Tests that require real database connection
    requires_cex: Tests that require CEX API connection
    requires_llm: Tests that require LLM API connection

# Logging
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %H:%M:%S

# Warnings
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::urllib3.exceptions.InsecureRequestWarning

# Coverage (optional, use with pytest-cov)
# addopts = --cov=. --cov-report=html --cov-report=term-missing
